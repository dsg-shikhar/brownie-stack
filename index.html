<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ben's Cookie Stack Master</title>
    <link rel="stylesheet" href="./style.css">
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "cannon": "https://unpkg.com/cannon-es@0.15.1/dist/cannon-es.js"
        }
      }
    </script>
</head>
<body>
    <div id="ui-container">
        <div id="score-counter">COOKIES BAKED: <span id="score">0</span></div>
        <div id="highscore-counter">BEST BATCH: <span id="highscore">0</span></div>
        <div id="powerup-status"></div>
    </div>

    <div id="instructions" class="overlay">
        <div class="brand-card">
            <div class="brand-logo">Ben's</div>
            <div class="brand-subtext">COOKIES</div>
            <h1 class="game-title">Stacking Rush</h1>
            <p class="game-desc">Tap or press Spacebar to perfectly stack fresh baked cookies. Watch out for crumbles!</p>
            <button id="start-btn" class="bens-btn">Start Baking</button>
        </div>
    </div>

    <div id="results" class="overlay hidden">
        <div class="brand-card error-border">
            <div class="brand-logo tiny">Ben's</div>
            <h1 class="game-title red-text">The Cookies Crumbled!</h1>
            <p class="game-desc">Your fresh batch fell short of the counter window.</p>
            <div class="end-stats">
                <p>Baking Score: <strong id="final-score">0</strong></p>
                <p>Bakery Record: <strong id="final-highscore">0</strong></p>
            </div>
            <button id="restart-btn" class="bens-btn">Bake Another Batch</button>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
